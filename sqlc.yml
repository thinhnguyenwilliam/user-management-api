# user-management-api/sqlc.yml
version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "internal/db/migrations/*.up.sql"
    queries: "internal/db/queries"

    gen:
      go:
        package: "db"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"

        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true

        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"

          - db_type: "timestamptz"
            go_type: "time.Time"

          - db_type: "text"
            go_type: "string"

          - column: "users.user_deleted_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - column: "users.user_age"
            go_type:
              type: "int32"
              pointer: true